<script src="https://hgverwaltung.ch/polyfill/v3/polyfill.min.js?features=fetch"></script>
<script src="https://cdn.jsdelivr.net/npm/list.js@2.3.1/dist/list.min.js"></script>
<script src="https://hgverwaltung.ch/static/hgutil-1.1.js"></script>
<link rel="stylesheet" href="https://https://cdn.jsdelivr.net/npm/leaflet@1.8.0/dist/leaflet.csskg.com/hint.css@2.7.0/hint.base.min.css"></link>

<style>
    /* <![CDATA[ */
	#hg_jahrSelect,
	#hg_teamSelect,
	#hg_data,
	#hg_fortlaufend,
	#hg_anzahl,
	#hg_alle {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
	}

	#hg_teamSelect {
	    display: none;
	}

	#hg_jahrSelect,
	#hg_alle,
	#hg_anzahl,
	#hg_anzahl input,
	#hg_fortlaufend,
	#hg_fortlaufend input,
	#hg_alle input {
		vertical-align: top;
	}

	#hg_fortlaufend {
		margin-left: 20px;
	}

	#hg_anzahl {
		margin-left: 20px;
	}

	#hg_data tbody tr:nth-child(odd) {
		background-color: #ebeff4;
	}

	#hg_data td.hg_number.plus {
		background-color: lightgreen;
	}

	#hg_data td.hg_number.minus {
		background-color: lightcoral;
	}

	#hg_data tr {
		text-align: left;
	}

	#hg_data th {
		cursor: default;
	}

	#hg_data .hg_number {
		text-align: right;
		padding-right: 5px;
	}

	#hg_data td.nachname {
		width: 200px;
	}

	#hg_data td.vorname {
		width: 200px;
	}

	#hg_data .sort.asc::after {
		content: "\25b2";
	}

	#hg_data .sort.desc::after {
		content: "\25bc";
	}

	#hg_total_tr td {
		font-weight: bold;
	}
	/*]]>*/
</style>

<select id="hg_teamSelect" size="3" multiple <<displayNone-hg_teamSelect>>></select>
<select id="hg_jahrSelect" <<displayNone-hg_jahrSelect>>></select>
<span id="hg_alle" <<displayNone-hg_alle>>>
	<input type="radio" name="alle" value="1" checked>Alle Spiele
	<input type="radio" name="alle" value="0">Nur Meisterschaft
</span>
<span id="hg_fortlaufend">
	<input type="checkbox" checked>Fortlaufende Berechnung
</span>
<span id="hg_anzahl">
	Anzahl Spiele:
	<input type="hg_number" min="1" max="999">
</span>

<table id="hg_data" style="display: none;">
	<thead>
		<tr>
			<th>&nbsp;</th>
		</tr>
	</thead>
	<tbody class="hg_list" id="hg_list">
		<tr>
			<td>&nbsp;</td>
		</tr>
	</tbody>
</table>

<table style="display: none;">
	<tr id="hg_tr_template">
	</tr>
</table>

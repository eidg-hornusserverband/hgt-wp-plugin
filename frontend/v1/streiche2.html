<style>
    /* <![CDATA[ */
    #hg_jahrSelect,
    #hg_teamSelect,
    #hg_data,
    #hg_alle {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    }

    #hg_jahrSelect,
    #hg_alle,
    #hg_alle input {
        vertical-align: top;
    }

    #hg_data tbody tr:nth-child(odd) {
        background-color: #ebeff4;
    }

    #hg_data tr {
        text-align: left;
    }

    #hg_data th {
        cursor: default;
    }

    #hg_data .hg_number {
        text-align: right;
        padding-right: 5px;
    }

    #hg_data td {
        width: 20px;
        white-space: nowrap;
    }

    #hg_data td.nachname {
        width: 200px;
        text-decoration: underline;
        text-decoration-color: gray;
    }

    #hg_data td.vorname {
        width: 200px;
        text-decoration: underline;
        text-decoration-color: gray;
    }

    #hg_data td.punkte {
        font-weight: bold;
    }

    #hg_data .sort.asc::after {
        content: "\25b2";
    }

    #hg_data .sort.desc::after {
        content: "\25bc";
    }

    #hg_total_tr td {
        font-weight: bold;
    }

    /*]]>*/
</style>

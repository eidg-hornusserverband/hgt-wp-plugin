<script src="https://hgverwaltung.ch/polyfill/v3/polyfill.min.js?features=fetch"></script>
<script src="https://cdn.jsdelivr.net/npm/list.js@2.3.1/dist/list.min.js"></script>

<style>
	/* <![CDATA[ */
	#hg_jahrSelect,
	#hg_teamSelect,
	#hg_data,
	#hg_alle {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
	}

	#hg_jahrSelect,
	#hg_alle,
	#hg_alle input {
		vertical-align: top;
	}

	#hg_data tbody tr:nth-child(odd) {
		background-color: #ebeff4;
	}

	#hg_data tr {
		text-align: left;
	}

	#hg_data th {
		cursor: default;
	}

	#hg_data .hg_number {
		text-align: right;
		padding-right: 5px;
	}

	#hg_data td {
		width: 40px;
		white-space: nowrap;
	}

	#hg_data td.nachname {
		width: 200px;
	}

	#hg_data td.vorname {
		width: 200px;
	}

	#hg_data td.diff.positive {
		background-color: lightgreen;
	}

	#hg_data td.diff.negative {
		background-color: lightcoral;
	}

	#hg_data .sort.asc::after {
		content: "\25b2";
	}

	#hg_data .sort.desc::after {
		content: "\25bc";
	}

	#hg_total_tr td {
		font-weight: bold;
	}

	/*]]>*/
</style>

<select id="hg_teamSelect" size="3" multiple <<displayNone-hg_teamSelect>>></select>
<select id="hg_jahrSelect" <<displayNone-hg_jahrSelect>>></select>
<span id="hg_alle" <<displayNone-hg_alle>>>
	<input type="radio" name="alle" value="1" checked>Alle Spiele
	<input type="radio" name="alle" value="0">Nur Meisterschaft
</span>

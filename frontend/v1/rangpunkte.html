<script src="https://hgverwaltung.ch/polyfill/v3/polyfill.min.js?features=fetch"></script>
<script src="https://cdn.jsdelivr.net/npm/list.js@2.3.1/dist/list.min.js"></script>
<script src="https://hgverwaltung.ch/static/hgutil-1.1.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hint.css@2.7.0/hint.base.min.css"></link>

<style>
    /* <![CDATA[ */
	#hg_jahrSelect,
	#hg_teamSelect,
	#hg_data {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
	}

	#hg_jahrSelect {
		vertical-align: top;
	}

	#hg_data tbody tr:nth-child(odd) {
		background-color: #ebeff4;
	}

	#hg_data tr {
		text-align: left;
	}

	#hg_data th {
		cursor: default;
	}

	#hg_data .hg_number {
		text-align: right;
		padding-right: 5px;
	}

	#hg_data td.nachname {
		width: 200px;
	}

	#hg_data td.vorname {
		width: 200px;
	}

	#hg_data td.total {
		width: 70px;
		font-weight: bold;
	}

	#hg_data td.over20 {
		background-color: lightgreen;
	}

	#hg_data .sort.asc::after {
		content: "\25b2";
	}

	#hg_data .sort.desc::after {
		content: "\25bc";
	}

	#hg_total_tr td {
		font-weight: bold;
	}
	/*]]>*/
</style>

<select id="hg_teamSelect" <<displayNone-hg_teamSelect>>></select>
<select id="hg_jahrSelect" <<displayNone-hg_jahrSelect>>></select>

<table id="hg_data" style="display: none;">
	<thead>
		<tr>
			<th>&nbsp;</th>
		</tr>
	</thead>
	<tbody class="hg_list">
		<tr>
			<td>&nbsp;</td>
		</tr>
	</tbody>
	<tfoot>
		<tr>
			<td>&nbsp;</td>
		</tr>
	</tfoot>
</table>

<table style="display: none;">
	<tr id="hg_tr_template">
	</tr>
	<tr id="hg_total_tr">
	</tr>
</table>

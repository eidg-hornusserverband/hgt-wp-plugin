<script src="https://hgverwaltung.ch/polyfill/v3/polyfill.min.js?features=fetch"></script>
<script src="https://hgverwaltung.ch/static/hgutil-1.1.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>

<style>
    /* <![CDATA[ */
	#hg_calc_label,
	#hg_calc,
	#hg_jahrSelect,
	#hg_spielerSelect,
	#hg_data,
	#hg_alle {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
	}

	#hg_jahrSelect,
	#hg_spielerSelect,
	#hg_alle,
	#hg_alle input {
		vertical-align: top;
	}

	#chart-container {
		margin-top: 20px;
	}

	#hg_calc_label {
		margin-left: 20px;
	}
	/*]]>*/
</style>

<select id="hg_spielerSelect"></select>
<select id="hg_jahrSelect" <<displayNone-hg_jahrSelect>>></select>
<span id="hg_alle" <<displayNone-hg_alle>>>
	<input type="radio" name="alle" value="1" checked>Alle Spiele
	<input type="radio" name="alle" value="0">Nur Meisterschaft
</span>
<span id="hg_calc_label">Berechnung:</span>
<span id="hg_calc">
	<input type="radio" name="calc" value="1" checked>Total
	<input type="radio" name="calc" value="0">Pro Ries
</span>

<div id="chart-container" style="position: relative; height:95vh; width:95vw">
	<canvas id="chart"></canvas>
</div>
